<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>历史记录</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/noscript.css">
  <script src="/echarts.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    body { background:#000; color:#eee; font-family:"Microsoft YaHei",sans-serif; padding:10px; }
    .back-btn { display:inline-block; margin-bottom:10px; padding:8px 15px; background:#e94560; color:white; border-radius:6px; text-decoration:none; }
    .record-item { background:#111; padding:10px; margin:10px 0; border-radius:8px; cursor:pointer; }
    .record-item:hover { background:#222; }
    .charts-container { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .chart-box { width:100%; height:250px; background:#111; border-radius:8px; }
    .export-btns { margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
    .export-btns button { background:#333; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
    .export-btns button:hover { background:#555; }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← 返回</a>
  <h2>保存的历史记录</h2>
  <div id="list"></div>
  <div id="detail" style="display:none;">
    <h3 id="detailTitle"></h3>
    <div class="charts-container" id="chartsArea"></div>
    <div class="export-btns" id="exportArea">
      <button onclick="exportCurrent('png')">导出图表图片(四合一)</button>
      <button onclick="exportCurrent('json')">导出 JSON</button>
      <button onclick="exportCurrent('xlsx')">导出 Excel</button>
      <button onclick="exportCurrent('txt')">导出 TXT</button>
    </div>
  </div>

  <script>
    const serverIP = localStorage.getItem('serverIP') || '47.96.190.248';
    const serverPort = localStorage.getItem('serverPort') || '3000';
    const baseURL = `http://${serverIP}:${serverPort}`;
    let currentRecord = null;

    async function loadList() {
      try {
        const res = await fetch(baseURL + '/history');
        const list = await res.json();
        const listDiv = document.getElementById('list');
        if (list.length === 0) { listDiv.innerHTML = '<p>暂无历史记录</p>'; return; }
        listDiv.innerHTML = list.map(r => 
          `<div class="record-item" onclick="showDetail(${r.id})">📅 ${r.timestamp} （记录 #${r.id}）</div>`
        ).join('');
      } catch (e) {
        document.getElementById('list').innerHTML = '<p style="color:red;">加载失败</p>';
      }
    }

    async function showDetail(id) {
      try {
        const res = await fetch(`${baseURL}/history/${id}`);
        currentRecord = await res.json();
        document.getElementById('detail').style.display = 'block';
        document.getElementById('detailTitle').textContent = `记录 #${id}  - ${currentRecord.timestamp}`;

        const area = document.getElementById('chartsArea');
        area.innerHTML = `
          <div id="chart1" class="chart-box"></div>
          <div id="chart2" class="chart-box"></div>
          <div id="chart3" class="chart-box"></div>
          <div id="chart4" class="chart-box"></div>
        `;

        const TH = 30.0;
        const grid = { top:35, bottom:50, left:50, right:10 };
        const xA = { type:'value', name:'角度°', nameTextStyle:{color:'#aaa'}, axisLabel:{color:'#aaa'} };
        const yA = { type:'value', name:'uT', nameTextStyle:{color:'#aaa'}, axisLabel:{color:'#aaa'} };
        const dataZoomConfig = [ { type: 'inside', xAxisIndex: 0 }, { type: 'slider', xAxisIndex: 0, bottom: 5 } ];

        function drawChart(domId, title, yDataArr) {
          const chart = echarts.init(document.getElementById(domId));
          const series = yDataArr.map(s => ({
            name: s.name, type: 'line', data: s.data,
            lineStyle: { width: s.width || 1, color: s.color, type: s.type || 'solid' }, symbol: 'none'
          }));
          chart.setOption({ title:{text:title,left:'center',textStyle:{color:'#eee',fontSize:13}}, grid, xAxis:xA, yAxis:yA, dataZoom: dataZoomConfig, series });
          return chart;
        }

        const pass1 = currentRecord.pass1Data;
        const pass2 = currentRecord.pass2Data;

        drawChart('chart1', 'Pass 1 磁场', [
          { name:'X', data: pass1.p1X || [], color:'#ff6b6b', width:1 },
          { name:'Y', data: pass1.p1Y || [], color:'#51cf66', width:1 },
          { name:'Z', data: pass1.p1Z || [], color:'#339af0', width:1.5 },
          { name:'Mag', data: pass1.p1Mag || [], color:'#f06595', type:'dashed', width:1 }
        ]);
        drawChart('chart2', 'Pass 2 磁场', [
          { name:'X', data: pass2.p2X || [], color:'#ff6b6b', width:1 },
          { name:'Y', data: pass2.p2Y || [], color:'#51cf66', width:1 },
          { name:'Z', data: pass2.p2Z || [], color:'#339af0', width:1.5 },
          { name:'Mag', data: pass2.p2Mag || [], color:'#f06595', type:'dashed', width:1 }
        ]);
        drawChart('chart3', 'Pass 1 差值', [
          { name:'差值', data: pass1.p1Diff || [], color:'#339af0', width:1 }
        ]);
        drawChart('chart4', 'Pass 2 差值', [
          { name:'差值', data: pass2.p2Diff || [], color:'#339af0', width:1 }
        ]);

        document.getElementById('detail').scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        alert('加载详情失败');
      }
    }

    function exportCurrent(format) {
      if (!currentRecord) return alert('请先选择一条记录');
      const rec = currentRecord;
      switch (format) {
        case 'png':
          exportCombinedPNG();
          break;
        case 'json':
          downloadFile(JSON.stringify(rec, null, 2), 'record.json', 'application/json');
          break;
        case 'xlsx':
          exportToExcel(rec);
          break;
        case 'txt':
          exportToTxt(rec);
          break;
      }
    }

    // 四张图合并为一张导出
    function exportCombinedPNG() {
      const chartIds = ['chart1', 'chart2', 'chart3', 'chart4'];
      const charts = chartIds.map(id => echarts.getInstanceByDom(document.getElementById(id)));
      if (charts.some(c => !c)) return alert('图表未就绪');

      // 获取四张图的图片数据
      const urls = charts.map(c => c.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#111' }));

      // 创建合并用的 canvas
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      // 设定合并后的尺寸（2x2 网格）
      const singleWidth = 800;
      const singleHeight = 500;
      canvas.width = singleWidth * 2;
      canvas.height = singleHeight * 2;

      // 绘制深色背景
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 逐个加载图片并绘制
      let loadedCount = 0;
      const positions = [
        { x: 0, y: 0 },                    // 左上
        { x: singleWidth, y: 0 },          // 右上
        { x: 0, y: singleHeight },         // 左下
        { x: singleWidth, y: singleHeight } // 右下
      ];

      urls.forEach((url, i) => {
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, positions[i].x, positions[i].y, singleWidth, singleHeight);
          loadedCount++;
          if (loadedCount === 4) {
            // 全部绘制完成，触发下载
            const mergedURL = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = mergedURL;
            a.download = 'combined_charts.png';
            a.click();
          }
        };
        img.src = url;
      });
    }

    function downloadFile(content, filename, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportToExcel(rec) {
      const wb = XLSX.utils.book_new();
      const p1Data = [['角度','X','Y','Z','Mag','Diff']];
      rec.pass1Data.p1Z.forEach((_, i) => {
        p1Data.push([
          rec.pass1Data.p1Z[i][0],
          rec.pass1Data.p1X[i][1],
          rec.pass1Data.p1Y[i][1],
          rec.pass1Data.p1Z[i][1],
          rec.pass1Data.p1Mag[i][1],
          rec.pass1Data.p1Diff[i][1]
        ]);
      });
      const ws1 = XLSX.utils.aoa_to_sheet(p1Data);
      XLSX.utils.book_append_sheet(wb, ws1, 'Pass1');

      const p2Data = [['角度','X','Y','Z','Mag','Diff']];
      rec.pass2Data.p2Z.forEach((_, i) => {
        p2Data.push([
          rec.pass2Data.p2Z[i][0],
          rec.pass2Data.p2X[i][1],
          rec.pass2Data.p2Y[i][1],
          rec.pass2Data.p2Z[i][1],
          rec.pass2Data.p2Mag[i][1],
          rec.pass2Data.p2Diff[i][1]
        ]);
      });
      const ws2 = XLSX.utils.aoa_to_sheet(p2Data);
      XLSX.utils.book_append_sheet(wb, ws2, 'Pass2');
      XLSX.writeFile(wb, 'record.xlsx');
    }

    function exportToTxt(rec) {
      let txt = 'Angle\tX\tY\tZ\tMag\tDiff\n';
      rec.pass1Data.p1Z.forEach((_, i) => {
        txt += `${rec.pass1Data.p1Z[i][0]}\t${rec.pass1Data.p1X[i][1]}\t${rec.pass1Data.p1Y[i][1]}\t${rec.pass1Data.p1Z[i][1]}\t${rec.pass1Data.p1Mag[i][1]}\t${rec.pass1Data.p1Diff[i][1]}\n`;
      });
      txt += '\nPass2\n';
      rec.pass2Data.p2Z.forEach((_, i) => {
        txt += `${rec.pass2Data.p2Z[i][0]}\t${rec.pass2Data.p2X[i][1]}\t${rec.pass2Data.p2Y[i][1]}\t${rec.pass2Data.p2Z[i][1]}\t${rec.pass2Data.p2Mag[i][1]}\t${rec.pass2Data.p2Diff[i][1]}\n`;
      });
      downloadFile(txt, 'record.txt', 'text/plain');
    }

    loadList();
  </script>
</body>
</html>
